name: courtside
description: "THE BOX — Sports booking, stats and player identity platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # ── UI ────────────────────────────────────────────────────
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  animate_do: ^4.2.0
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1

  # ── State & Navigation ────────────────────────────────────
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.3

  # ── Backend ───────────────────────────────────────────────
  supabase_flutter: ^2.12.2

  # ── Environment ───────────────────────────────────────────
  flutter_dotenv: ^5.2.1

  # ── Local storage ─────────────────────────────────────────
  shared_preferences: ^2.3.3
  hive_flutter: ^1.1.0

  # ── Utils ─────────────────────────────────────────────────
  intl: ^0.20.2
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  share_plus: ^10.1.4
  qr_flutter: ^4.1.0
  flutter_svg: ^2.0.10
  google_maps_flutter: ^2.17.0
  geolocator: ^14.0.2
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  # .env must be declared as an asset so Flutter can read it at runtime
  assets:
    - assets/.env
    - assets/map_style_dark.json
    - assets/map_style_light.json